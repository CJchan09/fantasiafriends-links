<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg1: #1a1040;
    --bg2: #3b1d6e;
    --bg3: #6b2fa0;
    --card: rgba(255, 255, 255, 0.08);
    --card-hover: rgba(255, 255, 255, 0.16);
    --text: #ffffff;
    --text-dim: rgba(255, 255, 255, 0.65);
  }

  body {
    font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(160deg, var(--bg1) 0%, var(--bg2) 55%, var(--bg3) 100%);
    background-attachment: fixed;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 48px 20px;
    overflow-x: hidden;
  }

  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: #fff;
    opacity: 0.7;
    animation: twinkle 3s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.15; transform: scale(0.8); }
    50%      { opacity: 0.9;  transform: scale(1.15); }
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    text-align: center;
  }

  .avatar {
    width: 108px;
    height: 108px;
    margin: 0 auto 18px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ffd86b, #ff8fb2, #a78bfa);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 52px;
    box-shadow: 0 8px 32px rgba(167, 139, 250, 0.45);
    border: 3px solid rgba(255, 255, 255, 0.35);
  }

  h1 {
    font-size: 1.7rem;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .tagline {
    color: var(--text-dim);
    font-size: 0.95rem;
    margin-bottom: 34px;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 20px;
    background: var(--card);
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 16px;
    color: var(--text);
    text-decoration: none;
    font-size: 1.05rem;
    font-weight: 600;
    backdrop-filter: blur(8px);
    transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
  }
  .link-btn:hover {
    background: var(--card-hover);
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 10px 24px rgba(0, 0, 0, 0.3);
  }
  .link-btn:active { transform: translateY(0) scale(0.99); }

  .icon {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .icon svg { width: 22px; height: 22px; fill: #fff; }

  .yt { background: #ff0000; }
  .tt { background: #010101; }
  .ig { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
  .fb { background: #1877f2; }
  .em { background: linear-gradient(135deg, #7c3aed, #db2777); }

  .label { flex: 1; text-align: left; }
  .sub { display: block; font-size: 0.78rem; font-weight: 400; color: var(--text-dim); margin-top: 2px; }

  footer {
    margin-top: 40px;
    color: var(--text-dim);
    font-size: 0.8rem;
  }

  @media (max-width: 400px) {
    h1 { font-size: 1.45rem; }
    .link-btn { padding: 14px 16px; }
  }
</style>

<script>
  const stars = document.getElementById('stars');
  for (let i = 0; i < 40; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 1;
    s.style.width = size + 'px';
    s.style.height = size + 'px';
    s.style.left = Math.random() * 100 + '%';
